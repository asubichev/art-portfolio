<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Art portfolio — original paintings, prints, and more." />
    <title>Art Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <a href="index.html" class="site-logo">Portfolio</a>
      <nav class="site-nav" aria-label="Site navigation">
        <a href="index.html">Gallery</a>
        <a href="mailto:hello@example.com">Contact</a>
      </nav>
    </header>

    <main>
      <section class="gallery-section" aria-label="Gallery">
        <h2>Works</h2>
        <p id="gallery-loading" aria-live="polite">Loading…</p>
        <p id="gallery-error" hidden aria-live="assertive"></p>
        <div id="gallery-grid" role="list" aria-label="Artwork gallery"></div>
      </section>
    </main>

    <footer class="site-footer">
      <p>&copy; <span id="footer-year"></span> Art Portfolio. All rights reserved.</p>
    </footer>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/gallery.js"></script>
    <script>
      document.getElementById('footer-year').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
